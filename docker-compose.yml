services:
  mysql:
    image: mysql:8.0
    container_name: webtienganh_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "Hao113205,"
      MYSQL_DATABASE: "edtech_db"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/databasedoan.sql:/docker-entrypoint-initdb.d/databasedoan.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: webtienganh_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
      DB_HOST: "mysql"
      DB_PORT: "3306"
      DB_USER: "root"
      DB_PASSWORD: "Hao113205,"
      DB_NAME: "edtech_db"
      JWT_SECRET: "Lap_trinh_web_do_an_cuoi_mon_2026"
      FRONTEND_URL: "http://localhost:5173"
      EMAIL_USER: "vohoang131005@gmail.com"
      EMAIL_PASS: "rokttyrtpvghslvh"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: "http://localhost:5000/api/v1"
    container_name: webtienganh_frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql_data: